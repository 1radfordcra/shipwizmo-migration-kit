<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google — Broad Reach</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8f6f3;
      color: #3d3229;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo svg { width: 28px; height: 28px; }
    .logo span { font-size: 18px; font-weight: 600; color: #3d3229; }
    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #8c7e6e;
      margin-bottom: 28px;
    }
    #google-btn {
      display: flex;
      justify-content: center;
      min-height: 44px;
      margin-bottom: 16px;
    }
    .status {
      font-size: 13px;
      color: #8c7e6e;
      margin-top: 12px;
    }
    .status.error { color: #dc2626; }
    .status.success { color: #166534; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #0d7377;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="#0d7377"/><path d="M10 16h12M16 10l6 6-6 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Broad Reach</span>
    </div>
    <h2>Sign in with Google</h2>
    <p class="subtitle">Select your Google account to continue</p>
    <div id="google-btn"></div>
    <div id="status" class="status">Loading Google Sign-In...</div>
  </div>

  <script>
    // MIGRATION: Replace this Client ID with your own from Google Cloud Console.
    // Project: buoyant-silicon-345213 | Also hardcoded in: app.js, command-center/app.js, command-center/oauth-popup.html
    const CLIENT_ID = '105648453442-gjnirc4fa4tmii07lt1lmd353serh4ng.apps.googleusercontent.com';
    const statusEl = document.getElementById('status');

    // Get the role from the URL hash (e.g., #admin or #client)
    const role = window.location.hash.replace('#', '') || 'client';

    function handleCredential(response) {
      if (!response.credential) {
        statusEl.textContent = 'No credential received. Please try again.';
        statusEl.className = 'status error';
        return;
      }

      statusEl.innerHTML = '<div class="spinner"></div>Signing you in...';
      statusEl.className = 'status success';

      // Send the credential (JWT id_token) back to the parent window
      if (window.opener) {
        try {
          window.opener.postMessage({
            type: 'br-google-credential',
            credential: response.credential,
            role: role
          }, '*');
        } catch (e) {
          console.error('postMessage failed:', e);
        }
        // Close popup after a short delay
        setTimeout(() => { window.close(); }, 800);
      } else {
        statusEl.textContent = 'Sign-in succeeded but could not communicate with the portal. Please close this window and try again.';
        statusEl.className = 'status error';
      }
    }

    // Wait for GSI library to load, then render the button
    function initGoogleButton() {
      if (window.google && window.google.accounts && window.google.accounts.id) {
        google.accounts.id.initialize({
          client_id: CLIENT_ID,
          callback: handleCredential,
          auto_select: false,
          cancel_on_tap_outside: false
        });

        google.accounts.id.renderButton(
          document.getElementById('google-btn'),
          {
            theme: 'outline',
            size: 'large',
            type: 'standard',
            text: 'signin_with',
            shape: 'rectangular',
            width: 300,
            logo_alignment: 'left'
          }
        );

        statusEl.textContent = 'Click the button above to sign in';
      } else {
        // Poll until loaded
        setTimeout(initGoogleButton, 200);
      }
    }

    // Start polling
    let attempts = 0;
    function tryInit() {
      attempts++;
      if (window.google && window.google.accounts && window.google.accounts.id) {
        initGoogleButton();
      } else if (attempts > 50) {
        statusEl.textContent = 'Google Sign-In failed to load. Please close this window and try again.';
        statusEl.className = 'status error';
      } else {
        setTimeout(tryInit, 200);
      }
    }
    tryInit();
  </script>
</body>
</html>
