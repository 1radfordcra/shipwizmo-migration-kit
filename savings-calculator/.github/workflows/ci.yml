# CI — Lint & Test
# Runs linting and tests on every push and PR.
name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Lint with flake8
        run: |
          flake8 cgi-bin/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 cgi-bin/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check formatting with Black
        run: black --check cgi-bin/

      - name: Run tests (if they exist)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/ -v
          else
            echo "No tests directory found — skipping"
          fi
