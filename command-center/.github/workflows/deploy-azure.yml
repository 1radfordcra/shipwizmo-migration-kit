# Deploy Command Center API to Azure App Service
# The dashboard (index.html, app.js, style.css) deploys via deploy-static.yml.
# This workflow deploys the API proxy server (api_server.py) which handles
# feed actions (block/remove/unblock contacts via HubSpot API).
#
# Required secret: AZURE_WEBAPP_PUBLISH_PROFILE
name: Deploy API Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api_server.py'
      - 'update_dashboard_cache.py'
      - 'update_cache_fast.py'
      - 'requirements.txt'

env:
  AZURE_WEBAPP_NAME: broadreach-command-center-api
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip deployment package
        run: |
          zip -r deploy.zip api_server.py update_dashboard_cache.py \
            update_cache_fast.py requirements.txt \
            -x '.env' '*.db' '__pycache__/*' '.git/*' \
               '.github/*' 'tests/*' '*.pyc' '.replit' 'replit.nix'

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
